name: TaskFlow CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/TaskFlow.Web/TaskFlow.Web.csproj

    - name: Build
      run: dotnet build src/TaskFlow.Web/TaskFlow.Web.csproj --no-restore

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Docker Build & Push
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/taskflow:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/taskflow:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ github.sha }}
